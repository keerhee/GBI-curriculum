<svg width="100%" style="max-width:680px"
     viewBox="0 0 680 480"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="한국 3층 연금 체계와 ISA 세제 활용 GBI">

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#B07517">
    한국 3층 연금 × ISA 통합 Asset Location
  </text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#37474F">
    계좌별 세제 특성 → 자산배치 최적화 → after-tax GBI
  </text>

  <!-- Layer 3: Private Pension (Top) -->
  <rect x="15" y="60" width="650" height="100" rx="8" fill="#FFF8E1" stroke="#F5A623" stroke-width="1.5"/>
  <text x="25" y="80" font-size="12" font-weight="700" fill="#B07517">
    3층 · 개인연금 (세액공제 · 과세이연)
  </text>
  <text x="660" y="80" text-anchor="end" font-size="9" fill="#455A64">세액공제 한도 900만 원/년</text>

  <rect x="25" y="90" width="205" height="62" rx="6" fill="#FFFFFF" stroke="#F5A623"/>
  <text x="127" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#B07517">연금저축</text>
  <text x="127" y="124" text-anchor="middle" font-size="9" fill="#263238">세액공제 600만 원</text>
  <text x="127" y="138" text-anchor="middle" font-size="9" fill="#263238">ETF·펀드 운용 가능</text>
  <text x="127" y="148" text-anchor="middle" font-size="9" fill="#455A64">연금수령 3.3~5.5%</text>

  <rect x="240" y="90" width="205" height="62" rx="6" fill="#FFFFFF" stroke="#F5A623"/>
  <text x="342" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#B07517">IRP (개인형 퇴직연금)</text>
  <text x="342" y="124" text-anchor="middle" font-size="9" fill="#263238">세액공제 +300만 원</text>
  <text x="342" y="138" text-anchor="middle" font-size="9" fill="#263238">70% 위험자산 제한</text>
  <text x="342" y="148" text-anchor="middle" font-size="9" fill="#455A64">RA 일임 2024.12~</text>

  <rect x="455" y="90" width="200" height="62" rx="6" fill="#FFFFFF" stroke="#F5A623"/>
  <text x="555" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#B07517">ISA (만능통장)</text>
  <text x="555" y="124" text-anchor="middle" font-size="9" fill="#263238">3년 의무·2,000만/년</text>
  <text x="555" y="138" text-anchor="middle" font-size="9" fill="#263238">손익통산·200만 비과세</text>
  <text x="555" y="148" text-anchor="middle" font-size="9" fill="#455A64">만기 연금전환 10% 공제</text>

  <!-- Layer 2: Corporate Pension (Middle) -->
  <rect x="15" y="170" width="650" height="90" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="25" y="190" font-size="12" font-weight="700" fill="#0D47A1">
    2층 · 퇴직연금 (회사·기업 제공)
  </text>
  <text x="660" y="190" text-anchor="end" font-size="9" fill="#455A64">적립금 501조 원 (2025.12)</text>

  <rect x="25" y="200" width="310" height="52" rx="6" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="180" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#0D47A1">DB (확정급여형)</text>
  <text x="180" y="234" text-anchor="middle" font-size="9" fill="#263238">기업이 운용 · 근로자 수령 확정</text>
  <text x="180" y="247" text-anchor="middle" font-size="9" fill="#455A64">LDI 적용 영역 (Week 6)</text>

  <rect x="345" y="200" width="310" height="52" rx="6" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="500" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#0D47A1">DC (확정기여형)</text>
  <text x="500" y="234" text-anchor="middle" font-size="9" fill="#263238">근로자 선택 운용 · 현재 87% 원리금보장</text>
  <text x="500" y="247" text-anchor="middle" font-size="9" fill="#455A64">RA 일임 확대 예정 (2단계)</text>

  <!-- Layer 1: National Pension (Bottom) -->
  <rect x="15" y="270" width="650" height="50" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="340" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#4A148C">
    1층 · 국민연금 (공적 · 세대간 이전)
  </text>
  <text x="340" y="308" text-anchor="middle" font-size="9" fill="#263238">
    소득대체율 40% (2028 목표) · PSP/GHP 관점에서 GHP (Floor) 역할
  </text>

  <!-- Asset Location Strategy (Bottom) -->
  <rect x="15" y="335" width="650" height="135" rx="8" fill="#FFF9C4" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="340" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">
    Asset Location 원칙 (한국형)
  </text>

  <text x="30" y="378" font-size="10" font-weight="700" fill="#C62828">▸ IRP·연금저축 (과세이연)</text>
  <text x="30" y="392" font-size="9" fill="#263238">· 배당주 ETF (15.4% → 연금수령 3.3~5.5%)</text>
  <text x="30" y="405" font-size="9" fill="#263238">· 해외채권 ETF (이자 이연)</text>
  <text x="30" y="418" font-size="9" fill="#263238">· REIT (배당 이연 효과 대)</text>

  <text x="350" y="378" font-size="10" font-weight="700" fill="#2E7D32">▸ ISA (손익통산·부분 비과세)</text>
  <text x="350" y="392" font-size="9" fill="#263238">· 손익통산이 유리한 고변동성 자산</text>
  <text x="350" y="405" font-size="9" fill="#263238">· 개별 주식 (손익통산 α)</text>
  <text x="350" y="418" font-size="9" fill="#263238">· 만기 연금전환 10% 공제 활용</text>

  <text x="30" y="438" font-size="10" font-weight="700" fill="#0D47A1">▸ 일반계좌 (15.4% · 손익통산 X)</text>
  <text x="30" y="452" font-size="9" fill="#263238">· 저배당·장기보유 자산 (미국 성장주 ETF)</text>
  <text x="30" y="464" font-size="9" fill="#263238">· 국내주식 (양도세 면제 구간 활용)</text>

  <text x="350" y="438" font-size="10" font-weight="700" fill="#6A1B9A">▸ 한계·개선 과제</text>
  <text x="350" y="452" font-size="9" fill="#263238">· TLH 불가 (손실이월 3년 제한)</text>
  <text x="350" y="464" font-size="9" fill="#263238">· 계좌별 통합 view 없음 (플랫폼 gap)</text>
</svg>
