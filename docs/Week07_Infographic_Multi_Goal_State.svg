<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Inter', 'Noto Sans KR', -apple-system, sans-serif">
  <rect width="1200" height="820" fill="#0f1629"/>

  <defs>
    <linearGradient id="goldG7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a244"/>
      <stop offset="100%" stop-color="#f0c869"/>
    </linearGradient>
    <linearGradient id="regionA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4cbf7a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2a8a52" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="regionB1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c869" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c99a38" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="regionB2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c869" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c99a38" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="regionC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e07a7a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a84848" stop-opacity="0.25"/>
    </linearGradient>
    <marker id="ar7" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#f0c869"/>
    </marker>
  </defs>

  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#f5f5f5">
    Multi-Goal Funding Ratio 상태 공간
  </text>
  <text x="600" y="78" text-anchor="middle" font-size="14" fill="url(#goldG7)" font-weight="500">
    2-Goal 예시 · (FR₁, FR₂) 평면의 4개 Action Region과 Das-Ostrov 포기 경계
  </text>
  <line x1="200" y1="100" x2="1000" y2="100" stroke="#d4a244" stroke-width="1" opacity="0.4"/>

  <!-- LEFT: FR plane chart -->
  <g transform="translate(60, 140)">
    <text x="260" y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#f0c869">
      (FR₁, FR₂) 평면과 Action Regions
    </text>

    <rect x="10" y="45" width="520" height="500" rx="8" fill="#0a1a2a" stroke="#2a3048" stroke-width="0.5"/>

    <!-- Chart area: FR_1 on x (0..2.5), FR_2 on y (0..2.5) -->
    <!-- Plot region: x 80..500 (width 420), y 510..90 (height 420, flipped) -->
    <!-- FR=1 at x=80+(1/2.5)*420=248, y=510-(1/2.5)*420=342 -->
    <!-- FR=1.2 at x=80+(1.2/2.5)*420=281.6, y=510-(1.2/2.5)*420=308.4 -->
    <!-- FR=0.8 at x=80+(0.8/2.5)*420=214.4, y=510-(0.8/2.5)*420=375.6 -->

    <!-- Background regions (drawn first, behind grid) -->
    <!-- Region C: both FR<1 (bottom-left of FR=1 lines) → triage/forgo -->
    <rect x="80" y="342" width="168" height="168" fill="url(#regionC)"/>

    <!-- Region B1: FR1>1, FR2<1 (transfer 1→2) -->
    <rect x="248" y="342" width="252" height="168" fill="url(#regionB1)"/>

    <!-- Region B2: FR1<1, FR2>1 (transfer 2→1) -->
    <rect x="80" y="90" width="168" height="252" fill="url(#regionB2)"/>

    <!-- Region A: both FR>1 (de-risk) -->
    <rect x="248" y="90" width="252" height="252" fill="url(#regionA)"/>

    <!-- Threshold lines for "lock & transfer" at FR=1.2 -->
    <line x1="281.6" y1="308.4" x2="281.6" y2="90" stroke="#f0c869" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="281.6" y1="308.4" x2="500" y2="308.4" stroke="#f0c869" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>

    <!-- Main boundary lines at FR=1 -->
    <line x1="248" y1="90" x2="248" y2="510" stroke="#d4a244" stroke-width="1.3" opacity="0.9"/>
    <line x1="80" y1="342" x2="500" y2="342" stroke="#d4a244" stroke-width="1.3" opacity="0.9"/>

    <!-- Axes -->
    <line x1="80" y1="510" x2="500" y2="510" stroke="#4a5470" stroke-width="1"/>
    <line x1="80" y1="90" x2="80" y2="510" stroke="#4a5470" stroke-width="1"/>

    <!-- x ticks FR_1 -->
    <g font-size="9" fill="#8a95a8">
      <text x="80" y="525" text-anchor="middle">0</text>
      <text x="164" y="525" text-anchor="middle">0.5</text>
      <text x="248" y="525" text-anchor="middle">1.0</text>
      <text x="282" y="525" text-anchor="middle" fill="#f0c869">1.2</text>
      <text x="332" y="525" text-anchor="middle">1.5</text>
      <text x="416" y="525" text-anchor="middle">2.0</text>
      <text x="500" y="525" text-anchor="middle">2.5</text>
    </g>
    <!-- y ticks FR_2 -->
    <g font-size="9" fill="#8a95a8">
      <text x="72" y="510" text-anchor="end">0</text>
      <text x="72" y="426" text-anchor="end">0.5</text>
      <text x="72" y="342" text-anchor="end">1.0</text>
      <text x="72" y="310" text-anchor="end" fill="#f0c869">1.2</text>
      <text x="72" y="258" text-anchor="end">1.5</text>
      <text x="72" y="174" text-anchor="end">2.0</text>
      <text x="72" y="90" text-anchor="end">2.5</text>
    </g>

    <text x="505" y="514" font-size="12" fill="#a8b0c0" font-weight="600">FR₁ (Goal 1)</text>
    <text x="85" y="82" font-size="12" fill="#a8b0c0" font-weight="600">FR₂ (Goal 2)</text>

    <!-- Region labels -->
    <g font-size="10.5" font-weight="700">
      <!-- Region C (bottom-left) -->
      <rect x="110" y="430" width="115" height="55" rx="4" fill="#1a0a0a" stroke="#e07a7a" stroke-width="0.8"/>
      <text x="168" y="448" text-anchor="middle" fill="#ff9090">Region C · Triage</text>
      <text x="168" y="463" text-anchor="middle" fill="#e0b0b0" font-size="9" font-weight="500">FR₁&lt;1 ∧ FR₂&lt;1</text>
      <text x="168" y="476" text-anchor="middle" fill="#e0b0b0" font-size="9" font-weight="500">→ Goal 포기 검토</text>

      <!-- Region B1 (bottom-right) -->
      <rect x="340" y="430" width="140" height="55" rx="4" fill="#2a2010" stroke="#f0c869" stroke-width="0.8"/>
      <text x="410" y="448" text-anchor="middle" fill="#f0c869">Region B₁ · Transfer</text>
      <text x="410" y="463" text-anchor="middle" fill="#d4a868" font-size="9" font-weight="500">FR₁&gt;1 ∧ FR₂&lt;1</text>
      <text x="410" y="476" text-anchor="middle" fill="#d4a868" font-size="9" font-weight="500">→ Goal 1 → Goal 2 이전</text>

      <!-- Region B2 (top-left) -->
      <rect x="100" y="140" width="130" height="55" rx="4" fill="#2a2010" stroke="#f0c869" stroke-width="0.8"/>
      <text x="165" y="158" text-anchor="middle" fill="#f0c869">Region B₂ · Transfer</text>
      <text x="165" y="173" text-anchor="middle" fill="#d4a868" font-size="9" font-weight="500">FR₁&lt;1 ∧ FR₂&gt;1</text>
      <text x="165" y="186" text-anchor="middle" fill="#d4a868" font-size="9" font-weight="500">→ Goal 2 → Goal 1 이전</text>

      <!-- Region A (top-right) -->
      <rect x="345" y="140" width="140" height="55" rx="4" fill="#0a2818" stroke="#4cbf7a" stroke-width="0.8"/>
      <text x="415" y="158" text-anchor="middle" fill="#7ae0a0">Region A · De-risk</text>
      <text x="415" y="173" text-anchor="middle" fill="#a8d0b0" font-size="9" font-weight="500">FR₁&gt;1 ∧ FR₂&gt;1</text>
      <text x="415" y="186" text-anchor="middle" fill="#a8d0b0" font-size="9" font-weight="500">→ Lock & reduce PSP</text>
    </g>

    <!-- Point markers: some example state trajectories -->
    <!-- (1.0, 1.0) center -->
    <circle cx="248" cy="342" r="5" fill="#f0c869" stroke="#0a1a2a" stroke-width="1.5"/>
    <text x="254" y="338" font-size="9" fill="#f0c869" font-weight="600">Target (1,1)</text>

    <!-- Sample path: start underfunded, rebalance, end overfunded -->
    <path d="M 156 410 Q 215 395 248 342 L 290 310 L 330 280 L 370 240"
          stroke="#7ab8e0" stroke-width="1.5" fill="none" stroke-dasharray="3,2" marker-end="url(#ar7)"/>
    <circle cx="156" cy="410" r="4" fill="#7ab8e0"/>
    <text x="107" y="420" font-size="8.5" fill="#7ab8e0" font-weight="600">t=0 (0.55, 0.65)</text>

    <!-- Critical forgo boundary annotation -->
    <g>
      <line x1="110" y1="445" x2="195" y2="445" stroke="#ff6060" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="110" y="412" font-size="8.5" fill="#ff9090" font-style="italic">Das-Ostrov</text>
      <text x="110" y="422" font-size="8.5" fill="#ff9090" font-style="italic">fuzzy forgo 경계</text>
    </g>
  </g>

  <!-- RIGHT: Funding ratio dynamics narrative -->
  <g transform="translate(600, 140)">
    <text x="280" y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#f0c869">
      Funding Ratio 동역학과 Action
    </text>

    <!-- Dynamic equation box -->
    <rect x="10" y="45" width="560" height="105" rx="8" fill="#0a1a2a" stroke="#d4a244" stroke-width="1"/>
    <text x="290" y="68" text-anchor="middle" font-size="12" fill="#f0c869" font-weight="700">Funding Ratio 동역학</text>
    <line x1="30" y1="78" x2="550" y2="78" stroke="#d4a244" stroke-width="0.3" opacity="0.5"/>

    <rect x="40" y="92" width="500" height="44" rx="4" fill="#1a2838" stroke="#2a4060" stroke-width="0.5"/>
    <text x="290" y="122" text-anchor="middle" font-size="17" fill="#e8e8e8" font-style="italic">
      FR<tspan baseline-shift="sub" font-size="10">k,t+1</tspan> = FR<tspan baseline-shift="sub" font-size="10">k,t</tspan> · (1 + w<tspan baseline-shift="sub" font-size="10">k,t</tspan>ᵀr) / (1 + r<tspan baseline-shift="sub" font-size="10">k</tspan><tspan baseline-shift="super" font-size="10">F</tspan>)
    </text>

    <!-- 4 action regions detail cards -->
    <g transform="translate(10, 170)">
      <!-- Region A -->
      <rect x="0" y="0" width="275" height="85" rx="6" fill="#0a2818" stroke="#4cbf7a" stroke-width="1"/>
      <text x="12" y="20" font-size="12" fill="#7ae0a0" font-weight="700">Region A · De-risk</text>
      <text x="12" y="38" font-size="10" fill="#a8d0b0">모든 FR &gt; 1 · 안전지대</text>
      <text x="12" y="55" font-size="10" fill="#d0e0d0">Action: PSP 비중 축소, lock-in</text>
      <text x="12" y="70" font-size="10" fill="#d0e0d0">초과분을 감가상각·세제 효율화</text>

      <!-- Region B (transfer) -->
      <rect x="285" y="0" width="275" height="85" rx="6" fill="#2a2010" stroke="#f0c869" stroke-width="1"/>
      <text x="297" y="20" font-size="12" fill="#f0c869" font-weight="700">Region B · Surplus Transfer</text>
      <text x="297" y="38" font-size="10" fill="#d4a868">한 goal over, 다른 goal under</text>
      <text x="297" y="55" font-size="10" fill="#e8d8b8">Action: Lock FR₁&gt;1.2의 초과분</text>
      <text x="297" y="70" font-size="10" fill="#e8d8b8">→ 최저 FR goal로 이전 (R1 rule)</text>

      <!-- Region C -->
      <rect x="0" y="95" width="560" height="85" rx="6" fill="#1a0a0a" stroke="#e07a7a" stroke-width="1"/>
      <text x="12" y="115" font-size="12" fill="#ff9090" font-weight="700">Region C · Triage (Das-Ostrov forgo decision)</text>
      <text x="12" y="133" font-size="10" fill="#e0b0b0">모든 FR &lt; 1 · aggregate infeasible</text>
      <text x="12" y="150" font-size="10" fill="#e8c8c8">Action: δ_k = 0 (포기), Tier 3 → Tier 2 → Tier 1 순</text>
      <text x="12" y="165" font-size="10" fill="#e8c8c8">포기된 자금을 essential goal로 재집중 · fuzzy threshold로 단계적 실행</text>
    </g>

    <!-- Rebalancing frequency summary -->
    <g transform="translate(10, 375)">
      <rect x="0" y="0" width="560" height="150" rx="8" fill="#1a2138" stroke="#3a4460" stroke-width="0.5"/>
      <text x="280" y="22" text-anchor="middle" font-size="12" fill="#f0c869" font-weight="700">Rebalancing Frequency 권고 (Das-Ostrov 2022)</text>
      <line x1="30" y1="32" x2="530" y2="32" stroke="#3a4460" stroke-width="0.5"/>

      <g font-size="10.5">
        <!-- Column headers -->
        <text x="22" y="52" fill="#8a95a8">주기</text>
        <text x="155" y="52" fill="#8a95a8">Goal 달성확률</text>
        <text x="305" y="52" fill="#8a95a8">거래비용</text>
        <text x="430" y="52" fill="#8a95a8">실무 평가</text>
        <line x1="20" y1="58" x2="540" y2="58" stroke="#3a4460" stroke-width="0.3"/>

        <text x="22" y="77" fill="#e8e8e8">정적 (0회)</text>
        <text x="155" y="77" fill="#a8b0c0">baseline</text>
        <text x="305" y="77" fill="#a8b0c0">없음</text>
        <text x="430" y="77" fill="#e07a7a">비추천</text>

        <text x="22" y="97" fill="#e8e8e8">연 1회</text>
        <text x="155" y="97" fill="#7ae0a0">+3–5%p</text>
        <text x="305" y="97" fill="#a8b0c0">낮음</text>
        <text x="430" y="97" fill="#4cbf7a">권장 최소</text>

        <text x="22" y="117" fill="#e8e8e8">분기 1회</text>
        <text x="155" y="117" fill="#7ae0a0">+4–7%p</text>
        <text x="305" y="117" fill="#d4a868">중간</text>
        <text x="430" y="117" fill="#f0c869">sweet spot</text>

        <text x="22" y="137" fill="#e8e8e8">월 1회</text>
        <text x="155" y="137" fill="#a8b0c0">marginal</text>
        <text x="305" y="137" fill="#e07a7a">높음</text>
        <text x="430" y="137" fill="#e07a7a">over-trading</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <text x="1140" y="800" text-anchor="end" font-size="10" fill="#5a6478" font-style="italic">
    GBI Curriculum · Week 07 · Figure 1
  </text>
</svg>
