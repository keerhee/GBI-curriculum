<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Inter', 'Noto Sans KR', -apple-system, sans-serif">
  <rect width="1200" height="820" fill="#0f1629"/>

  <defs>
    <linearGradient id="goldG6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a244"/>
      <stop offset="100%" stop-color="#f0c869"/>
    </linearGradient>
    <linearGradient id="instG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a7a8a"/>
      <stop offset="100%" stop-color="#3c5c6c"/>
    </linearGradient>
    <linearGradient id="indG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e5f8e"/>
      <stop offset="100%" stop-color="#164669"/>
    </linearGradient>
    <linearGradient id="ghpG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4cbf7a"/>
      <stop offset="100%" stop-color="#2a8a52"/>
    </linearGradient>
    <linearGradient id="pspG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e07a7a"/>
      <stop offset="100%" stop-color="#a84848"/>
    </linearGradient>
    <marker id="ar6" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#d4a244"/>
    </marker>
  </defs>

  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#f5f5f5">
    LDI → GBI · 기관에서 개인으로
  </text>
  <text x="600" y="78" text-anchor="middle" font-size="14" fill="url(#goldG6)" font-weight="500">
    Martellini-Milhau framework · PSP/GHP 이중분해 · 은퇴 replacement income 문제
  </text>
  <line x1="200" y1="100" x2="1000" y2="100" stroke="#d4a244" stroke-width="1" opacity="0.4"/>

  <!-- UPPER: Parallel structure - LDI (left) vs GBI (right) -->
  <g transform="translate(60, 135)">
    <text x="540" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#f0c869">
      구조적 동일성: DB Pension LDI과 Individual GBI
    </text>

    <!-- LDI (left) -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="500" height="250" rx="10" fill="url(#instG)" stroke="#7a9aaa" stroke-width="1"/>
      <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#f5f5f5">INSTITUTIONAL · LDI</text>
      <text x="250" y="48" text-anchor="middle" font-size="11" fill="#c0d8e0" font-style="italic">Tepper (1981) · Black (1989)</text>
      <line x1="30" y1="62" x2="470" y2="62" stroke="#7a9aaa" stroke-width="0.5"/>

      <text x="20" y="85" font-size="11" fill="#f0c869" font-weight="600">주체</text>
      <text x="100" y="85" font-size="11.5" fill="#e8e8e8">DB 연금기금 (CalPERS, NPS 등)</text>

      <text x="20" y="110" font-size="11" fill="#f0c869" font-weight="600">Liability</text>
      <text x="100" y="110" font-size="11.5" fill="#e8e8e8">미래 연금 지급 obligation</text>

      <text x="20" y="135" font-size="11" fill="#f0c869" font-weight="600">목표</text>
      <text x="100" y="135" font-size="11.5" fill="#e8e8e8">Funding ratio 안정화</text>

      <text x="20" y="160" font-size="11" fill="#f0c869" font-weight="600">분해</text>
      <text x="100" y="160" font-size="11.5" fill="#e8e8e8">LHP + PSP</text>

      <text x="20" y="185" font-size="11" fill="#f0c869" font-weight="600">LHP 자산</text>
      <text x="100" y="185" font-size="11.5" fill="#e8e8e8">Duration-matched 채권</text>

      <text x="20" y="210" font-size="11" fill="#f0c869" font-weight="600">성숙도</text>
      <text x="100" y="210" font-size="11.5" fill="#c0d8e0">40년+ 연구·실무 축적</text>

      <rect x="20" y="220" width="460" height="22" rx="4" fill="#0a1a2a"/>
      <text x="250" y="236" text-anchor="middle" font-size="11" fill="#c0d8e0" font-style="italic">A_t = α^LHP · LHP_t + α^PSP · PSP_t</text>
    </g>

    <!-- Arrow with translation label -->
    <g transform="translate(510, 165)">
      <line x1="0" y1="0" x2="70" y2="0" stroke="url(#goldG6)" stroke-width="3" marker-end="url(#ar6)"/>
      <text x="35" y="-10" text-anchor="middle" font-size="10" fill="#d4a244" font-weight="600">Martellini</text>
      <text x="35" y="18" text-anchor="middle" font-size="10" fill="#d4a244" font-weight="600">2013–2017</text>
      <text x="35" y="31" text-anchor="middle" font-size="9" fill="#a8b0c0" font-style="italic">재명명·재해석</text>
    </g>

    <!-- Individual GBI (right) -->
    <g transform="translate(580, 40)">
      <rect x="0" y="0" width="500" height="250" rx="10" fill="url(#indG)" stroke="#2a7bbb" stroke-width="1"/>
      <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#f5f5f5">INDIVIDUAL · GBI</text>
      <text x="250" y="48" text-anchor="middle" font-size="11" fill="#b0d4f0" font-style="italic">Martellini-Milhau-Mulvey (2018)</text>
      <line x1="30" y1="62" x2="470" y2="62" stroke="#2a7bbb" stroke-width="0.5"/>

      <text x="20" y="85" font-size="11" fill="#f0c869" font-weight="600">주체</text>
      <text x="100" y="85" font-size="11.5" fill="#e8e8e8">DC 가입자 (개인 은퇴 준비자)</text>

      <text x="20" y="110" font-size="11" fill="#f0c869" font-weight="600">"Liability"</text>
      <text x="100" y="110" font-size="11.5" fill="#e8e8e8">은퇴 후 replacement income 현가</text>

      <text x="20" y="135" font-size="11" fill="#f0c869" font-weight="600">목표</text>
      <text x="100" y="135" font-size="11.5" fill="#e8e8e8">Essential goal 확보 + upside</text>

      <text x="20" y="160" font-size="11" fill="#f0c869" font-weight="600">분해</text>
      <text x="100" y="160" font-size="11.5" fill="#e8e8e8">GHP + PSP</text>

      <text x="20" y="185" font-size="11" fill="#f0c869" font-weight="600">GHP 자산</text>
      <text x="100" y="185" font-size="11.5" fill="#e8e8e8">Retirement Bond (synthetic)</text>

      <text x="20" y="210" font-size="11" fill="#f0c869" font-weight="600">성숙도</text>
      <text x="100" y="210" font-size="11.5" fill="#b0d4f0">2015- EDHEC framework, 진화 중</text>

      <rect x="20" y="220" width="460" height="22" rx="4" fill="#0a1a2a"/>
      <text x="250" y="236" text-anchor="middle" font-size="11" fill="#b0d4f0" font-style="italic">W_t = α^GHP · GHP_t + α^PSP · PSP_t</text>
    </g>
  </g>

  <!-- MIDDLE: Dynamic allocation formula (centerpiece) -->
  <g transform="translate(300, 430)">
    <rect x="0" y="0" width="600" height="140" rx="12" fill="#0a1a2a" stroke="#d4a244" stroke-width="1.5"/>
    <text x="300" y="30" text-anchor="middle" font-size="13" fill="#f0c869" font-weight="700">Martellini 동적 배분 규칙</text>
    <line x1="150" y1="42" x2="450" y2="42" stroke="#d4a244" stroke-width="0.3"/>

    <rect x="60" y="58" width="480" height="52" rx="6" fill="#1a2838" stroke="#d4a244" stroke-width="0.5"/>
    <text x="300" y="90" text-anchor="middle" font-size="20" fill="url(#goldG6)" font-style="italic" font-weight="700">
      α_t^PSP · W_t = m · (W_t − F_t)
    </text>

    <text x="300" y="128" text-anchor="middle" font-size="11" fill="#a8b0c0" font-style="italic">
      "PSP 배분 = multiplier × risk budget" · CPPI 구조의 자연스런 적용
    </text>
  </g>

  <!-- LOWER: GHP vs PSP tiles + dynamic behavior -->
  <g transform="translate(60, 600)">
    <!-- GHP -->
    <rect x="0" y="0" width="330" height="170" rx="10" fill="url(#ghpG)" stroke="#1e6040" stroke-width="1.5"/>
    <text x="165" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">GHP</text>
    <text x="165" y="47" text-anchor="middle" font-size="11" fill="#d4f1d4" font-style="italic">Goal-Hedging Portfolio</text>
    <line x1="30" y1="60" x2="300" y2="60" stroke="#1e6040" stroke-width="0.3"/>

    <text x="20" y="82" font-size="11" fill="#1a3a1a" font-weight="600">역할</text>
    <text x="20" y="98" font-size="10.5" fill="#0a1a0a">Floor 확보 · 목표 현가 복제</text>

    <text x="20" y="118" font-size="11" fill="#1a3a1a" font-weight="600">자산</text>
    <text x="20" y="134" font-size="10.5" fill="#0a1a0a">Retirement bond (TIPS·물가연동)</text>

    <text x="20" y="152" font-size="10" fill="#1a3a1a" font-style="italic">F_t = Σ C_s / (1+y_t)^(s-t)</text>

    <!-- PSP -->
    <rect x="350" y="0" width="330" height="170" rx="10" fill="url(#pspG)" stroke="#7a2a2a" stroke-width="1.5"/>
    <text x="515" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">PSP</text>
    <text x="515" y="47" text-anchor="middle" font-size="11" fill="#f0d0d0" font-style="italic">Performance-Seeking Portfolio</text>
    <line x1="380" y1="60" x2="650" y2="60" stroke="#7a2a2a" stroke-width="0.3"/>

    <text x="370" y="82" font-size="11" fill="#3a1a1a" font-weight="600">역할</text>
    <text x="370" y="98" font-size="10.5" fill="#1a0a0a">Premium harvesting · upside</text>

    <text x="370" y="118" font-size="11" fill="#3a1a1a" font-weight="600">자산</text>
    <text x="370" y="134" font-size="10.5" fill="#1a0a0a">Smart factor equity · PE · alt</text>

    <text x="370" y="152" font-size="10" fill="#3a1a1a" font-style="italic">PSP = arg max Sharpe (goal-agnostic)</text>

    <!-- Dynamic behavior -->
    <rect x="700" y="0" width="380" height="170" rx="10" fill="#1a2138" stroke="#d4a244" stroke-width="1"/>
    <text x="890" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#f0c869">Dynamic 행동</text>
    <line x1="720" y1="37" x2="1060" y2="37" stroke="#d4a244" stroke-width="0.3"/>

    <text x="715" y="58" font-size="10.5" fill="#d0d0d0">
      <tspan fill="#4cbf7a" font-weight="600">Bull market:</tspan>
      <tspan> W_t ↑ → B_t ↑ → PSP 비중 ↑</tspan>
    </text>
    <text x="715" y="76" font-size="10" fill="#a8b0c0" font-style="italic">upside lock-in</text>

    <text x="715" y="98" font-size="10.5" fill="#d0d0d0">
      <tspan fill="#e07a7a" font-weight="600">Bear market:</tspan>
      <tspan> W_t ↓ → B_t ↓ → PSP 비중 ↓</tspan>
    </text>
    <text x="715" y="116" font-size="10" fill="#a8b0c0" font-style="italic">자동 방어 전환</text>

    <text x="715" y="138" font-size="10.5" fill="#d0d0d0">
      <tspan fill="#f0c869" font-weight="600">At floor:</tspan>
      <tspan> W_t → F_t → PSP → 0</tspan>
    </text>
    <text x="715" y="156" font-size="10" fill="#a8b0c0" font-style="italic">floor 보호 · goal 달성 확정</text>
  </g>

  <text x="1140" y="808" text-anchor="end" font-size="10" fill="#5a6478" font-style="italic">
    GBI Curriculum · Week 06 · Figure 1
  </text>
</svg>
