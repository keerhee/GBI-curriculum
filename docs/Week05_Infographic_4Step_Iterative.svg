<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Inter', 'Noto Sans KR', -apple-system, sans-serif">
  <rect width="1200" height="820" fill="#0f1629"/>

  <defs>
    <linearGradient id="goldG5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a244"/>
      <stop offset="100%" stop-color="#f0c869"/>
    </linearGradient>
    <linearGradient id="step1G" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e5f8e"/>
      <stop offset="100%" stop-color="#164669"/>
    </linearGradient>
    <linearGradient id="step2G" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4cbf7a"/>
      <stop offset="100%" stop-color="#2a8a52"/>
    </linearGradient>
    <linearGradient id="step3G" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0c869"/>
      <stop offset="100%" stop-color="#c99a38"/>
    </linearGradient>
    <linearGradient id="step4G" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a874d4"/>
      <stop offset="100%" stop-color="#7a4ca8"/>
    </linearGradient>
    <marker id="ar5" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#d4a244"/>
    </marker>
  </defs>

  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#f5f5f5">
    Brunel's 4-Step Iterative Model
  </text>
  <text x="600" y="78" text-anchor="middle" font-size="14" fill="url(#goldG5)" font-weight="500">
    이론(Das-Markowitz)에서 실무(UHNW Family Office)로의 번역 프로세스
  </text>
  <line x1="200" y1="100" x2="1000" y2="100" stroke="#d4a244" stroke-width="1" opacity="0.4"/>

  <!-- Central circular iterative diagram -->
  <!-- 4 steps at 12, 3, 6, 9 o'clock -->
  <g transform="translate(600, 430)">
    <!-- Outer iteration arrows -->
    <circle r="230" fill="none" stroke="#d4a244" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.3"/>

    <!-- Step 1: top (12 o'clock) -->
    <g transform="translate(0, -190)">
      <rect x="-125" y="-65" width="250" height="130" rx="12" fill="url(#step1G)" stroke="#2a7bbb" stroke-width="1.5"/>
      <text x="0" y="-38" text-anchor="middle" font-size="11" fill="#f0c869" font-weight="700">STEP 1</text>
      <text x="0" y="-15" text-anchor="middle" font-size="16" font-weight="700" fill="#f5f5f5">Identify Goals</text>
      <text x="0" y="4" text-anchor="middle" font-size="11" fill="#b0d4f0">목표 발굴</text>
      <line x1="-80" y1="15" x2="80" y2="15" stroke="#4a90c8" stroke-width="0.4"/>
      <text x="0" y="32" text-anchor="middle" font-size="10" fill="#b0d4f0">가족 인터뷰 · 5대 질문</text>
      <text x="0" y="48" text-anchor="middle" font-size="10" fill="#b0d4f0">자연어 → 재무언어 translation</text>
    </g>

    <!-- Step 2: right (3 o'clock) -->
    <g transform="translate(200, 0)">
      <rect x="-125" y="-65" width="250" height="130" rx="12" fill="url(#step2G)" stroke="#4a8a4a" stroke-width="1.5"/>
      <text x="0" y="-38" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="700">STEP 2</text>
      <text x="0" y="-15" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Dollar-Weight</text>
      <text x="0" y="4" text-anchor="middle" font-size="11" fill="#d0f0d0">자본 할당</text>
      <line x1="-80" y1="15" x2="80" y2="15" stroke="#6aaa6a" stroke-width="0.4"/>
      <text x="0" y="32" text-anchor="middle" font-size="10" fill="#d0f0d0">F_i = PV(H_i, T_i, r_i)</text>
      <text x="0" y="48" text-anchor="middle" font-size="10" fill="#d0f0d0">π_i = F_i / Σ F_j · feasibility</text>
    </g>

    <!-- Step 3: bottom (6 o'clock) -->
    <g transform="translate(0, 190)">
      <rect x="-125" y="-65" width="250" height="130" rx="12" fill="url(#step3G)" stroke="#b08830" stroke-width="1.5"/>
      <text x="0" y="-38" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="700">STEP 3</text>
      <text x="0" y="-15" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Build Modules</text>
      <text x="0" y="4" text-anchor="middle" font-size="11" fill="#3a301a">모듈 포트폴리오</text>
      <line x1="-80" y1="15" x2="80" y2="15" stroke="#b08830" stroke-width="0.4"/>
      <text x="0" y="32" text-anchor="middle" font-size="10" fill="#3a301a">각 목표 → standardized module</text>
      <text x="0" y="48" text-anchor="middle" font-size="10" fill="#3a301a">Das-Markowitz w_i* 적용</text>
    </g>

    <!-- Step 4: left (9 o'clock) -->
    <g transform="translate(-200, 0)">
      <rect x="-125" y="-65" width="250" height="130" rx="12" fill="url(#step4G)" stroke="#9a6ace" stroke-width="1.5"/>
      <text x="0" y="-38" text-anchor="middle" font-size="11" fill="#f0c869" font-weight="700">STEP 4</text>
      <text x="0" y="-15" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Monitor</text>
      <text x="0" y="4" text-anchor="middle" font-size="11" fill="#e0c8e0">모니터링·재배분</text>
      <line x1="-80" y1="15" x2="80" y2="15" stroke="#bb8adc" stroke-width="0.4"/>
      <text x="0" y="32" text-anchor="middle" font-size="10" fill="#e0c8e0">FR_i = W_{t,i} / F_{t,i}</text>
      <text x="0" y="48" text-anchor="middle" font-size="10" fill="#e0c8e0">Trigger · rebalance · iterate</text>
    </g>

    <!-- Arrows between steps (curved) -->
    <!-- 1→2 (top to right) -->
    <path d="M 100 -175 A 180 180 0 0 1 175 -100" stroke="url(#goldG5)" stroke-width="2" fill="none" marker-end="url(#ar5)"/>
    <!-- 2→3 (right to bottom) -->
    <path d="M 175 100 A 180 180 0 0 1 100 175" stroke="url(#goldG5)" stroke-width="2" fill="none" marker-end="url(#ar5)"/>
    <!-- 3→4 (bottom to left) -->
    <path d="M -100 175 A 180 180 0 0 1 -175 100" stroke="url(#goldG5)" stroke-width="2" fill="none" marker-end="url(#ar5)"/>
    <!-- 4→1 (left to top) with "iterate" label -->
    <path d="M -175 -100 A 180 180 0 0 1 -100 -175" stroke="url(#goldG5)" stroke-width="2" fill="none" marker-end="url(#ar5)"/>

    <!-- Center label -->
    <circle r="72" fill="#0a1a2a" stroke="#d4a244" stroke-width="1.5"/>
    <text y="-10" text-anchor="middle" font-size="13" font-weight="700" fill="#f0c869">Iterative</text>
    <text y="10" text-anchor="middle" font-size="13" font-weight="700" fill="#f0c869">Cycle</text>
    <text y="30" text-anchor="middle" font-size="10" fill="#a8b0c0" font-style="italic">5-7 years</text>
    <text y="45" text-anchor="middle" font-size="10" fill="#a8b0c0" font-style="italic">full rewrite</text>
  </g>

  <!-- Left side: Inputs -->
  <g transform="translate(30, 170)">
    <rect x="0" y="0" width="200" height="510" rx="10" fill="#1a2138" stroke="#3a4460" stroke-width="1"/>
    <text x="100" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#f0c869">INPUTS</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#3a4460" stroke-width="0.5"/>

    <text x="15" y="65" font-size="11" fill="#7ab8e0" font-weight="600">Family</text>
    <text x="15" y="82" font-size="10.5" fill="#a8b0c0">· 세대별 구성원</text>
    <text x="15" y="98" font-size="10.5" fill="#a8b0c0">· 가치·ethos</text>
    <text x="15" y="114" font-size="10.5" fill="#a8b0c0">· 5대 질문 응답</text>

    <text x="15" y="145" font-size="11" fill="#7ab8e0" font-weight="600">Assets</text>
    <text x="15" y="162" font-size="10.5" fill="#a8b0c0">· Internal lifestyle</text>
    <text x="15" y="178" font-size="10.5" fill="#a8b0c0">· Internal non-lifestyle</text>
    <text x="15" y="194" font-size="10.5" fill="#a8b0c0">· External assets</text>
    <text x="15" y="210" font-size="10.5" fill="#a8b0c0">· 가족기업 지분</text>

    <text x="15" y="241" font-size="11" fill="#7ab8e0" font-weight="600">Context</text>
    <text x="15" y="258" font-size="10.5" fill="#a8b0c0">· Tax (상속세 50%)</text>
    <text x="15" y="274" font-size="10.5" fill="#a8b0c0">· Legal structures</text>
    <text x="15" y="290" font-size="10.5" fill="#a8b0c0">· Regulatory</text>

    <text x="15" y="321" font-size="11" fill="#7ab8e0" font-weight="600">Capital Markets</text>
    <text x="15" y="338" font-size="10.5" fill="#a8b0c0">· μ, Σ 추정</text>
    <text x="15" y="354" font-size="10.5" fill="#a8b0c0">· 자산군 universe</text>
    <text x="15" y="370" font-size="10.5" fill="#a8b0c0">· 기대수익 가정</text>

    <rect x="20" y="410" width="160" height="80" rx="6" fill="#0a1a2a" stroke="#d4a244" stroke-width="0.5"/>
    <text x="100" y="432" text-anchor="middle" font-size="10.5" fill="#f0c869" font-weight="600">Theory layer</text>
    <text x="100" y="450" text-anchor="middle" font-size="9.5" fill="#d4a244">Das-Markowitz (2010)</text>
    <text x="100" y="465" text-anchor="middle" font-size="9.5" fill="#d4a244">BPT · SP/A · Chhabra</text>
    <text x="100" y="482" text-anchor="middle" font-size="9" fill="#a8b0c0" font-style="italic">→ 산업 언어로 번역</text>
  </g>

  <!-- Right side: Outputs -->
  <g transform="translate(970, 170)">
    <rect x="0" y="0" width="200" height="510" rx="10" fill="#1a2138" stroke="#3a4460" stroke-width="1"/>
    <text x="100" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#f0c869">OUTPUTS</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#3a4460" stroke-width="0.5"/>

    <text x="15" y="65" font-size="11" fill="#4cbf7a" font-weight="600">ISP Document</text>
    <text x="15" y="82" font-size="10.5" fill="#a8b0c0">· Executive summary</text>
    <text x="15" y="98" font-size="10.5" fill="#a8b0c0">· Goals articulation</text>
    <text x="15" y="114" font-size="10.5" fill="#a8b0c0">· Strategic allocation</text>
    <text x="15" y="130" font-size="10.5" fill="#a8b0c0">· Risk framework</text>

    <text x="15" y="161" font-size="11" fill="#4cbf7a" font-weight="600">Module Portfolios</text>
    <text x="15" y="178" font-size="10.5" fill="#a8b0c0">· Capital Preservation</text>
    <text x="15" y="194" font-size="10.5" fill="#a8b0c0">· Balanced Growth</text>
    <text x="15" y="210" font-size="10.5" fill="#a8b0c0">· Long-term Growth</text>
    <text x="15" y="226" font-size="10.5" fill="#a8b0c0">· Aggressive / PE</text>
    <text x="15" y="242" font-size="10.5" fill="#a8b0c0">· Perpetual Endowment</text>

    <text x="15" y="273" font-size="11" fill="#4cbf7a" font-weight="600">Governance</text>
    <text x="15" y="290" font-size="10.5" fill="#a8b0c0">· Family meeting 구조</text>
    <text x="15" y="306" font-size="10.5" fill="#a8b0c0">· Advisor 권한 범위</text>
    <text x="15" y="322" font-size="10.5" fill="#a8b0c0">· Review 일정</text>

    <text x="15" y="353" font-size="11" fill="#4cbf7a" font-weight="600">KPI Dashboard</text>
    <text x="15" y="370" font-size="10.5" fill="#a8b0c0">· 목표별 funding ratio</text>
    <text x="15" y="386" font-size="10.5" fill="#a8b0c0">· Stress scenarios</text>
    <text x="15" y="402" font-size="10.5" fill="#a8b0c0">· Liquidity analysis</text>

    <rect x="20" y="420" width="160" height="70" rx="6" fill="#0a1a2a" stroke="#4cbf7a" stroke-width="0.5"/>
    <text x="100" y="440" text-anchor="middle" font-size="10.5" fill="#7ae0a0" font-weight="600">Practice layer</text>
    <text x="100" y="458" text-anchor="middle" font-size="9.5" fill="#a8e0b8">UHNW consultation</text>
    <text x="100" y="474" text-anchor="middle" font-size="9" fill="#a8b0c0" font-style="italic">Brunel Associates standard</text>
  </g>

  <!-- Bottom footer -->
  <g transform="translate(60, 720)">
    <rect x="0" y="0" width="1080" height="68" rx="8" fill="#0a1a2a" stroke="#1e5f8e" stroke-width="1"/>
    <text x="30" y="28" font-size="13" font-weight="700" fill="#f0c869">핵심 통찰 · Brunel Bridge</text>
    <text x="30" y="52" font-size="11.5" fill="#d0d0d0">
      Das-Markowitz MA framework는 수학적 엔진, Brunel 4-step model은 <tspan fill="#f0c869" font-weight="600">"실무 워크플로우"</tspan> — 고객 상담에서 ISP 서명까지, 이론의 산업화 통로.
    </text>
  </g>

  <text x="1140" y="810" text-anchor="end" font-size="10" fill="#5a6478" font-style="italic">
    GBI Curriculum · Week 05 · Figure 1
  </text>
</svg>
