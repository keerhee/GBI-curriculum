<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Inter', 'Noto Sans KR', -apple-system, sans-serif">
  <rect width="1200" height="820" fill="#0f1629"/>

  <defs>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a244"/>
      <stop offset="100%" stop-color="#f0c869"/>
    </linearGradient>
    <linearGradient id="ptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e5f8e"/>
      <stop offset="100%" stop-color="#164669"/>
    </linearGradient>
    <linearGradient id="maGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a7a5a"/>
      <stop offset="100%" stop-color="#3c5c3c"/>
    </linearGradient>
    <linearGradient id="spaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a5a8a"/>
      <stop offset="100%" stop-color="#603c60"/>
    </linearGradient>
    <linearGradient id="gbiGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a244"/>
      <stop offset="100%" stop-color="#a87826"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#d4a244"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#f5f5f5">
    Three Theories, One Destination
  </text>
  <text x="600" y="78" text-anchor="middle" font-size="15" fill="url(#goldGrad2)" font-weight="500">
    Prospect Theory · Mental Accounting · SP/A → Goal-Based Investing
  </text>
  <line x1="200" y1="100" x2="1000" y2="100" stroke="#d4a244" stroke-width="1" opacity="0.4"/>

  <!-- Three theory boxes at top -->
  
  <!-- PT box -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="340" height="240" rx="10" fill="url(#ptGrad)" stroke="#2a7bbb" stroke-width="1"/>
    <text x="170" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#f5f5f5">Prospect Theory</text>
    <text x="170" y="52" text-anchor="middle" font-size="11" fill="#b0d4f0" font-style="italic">Kahneman-Tversky (1979, 1992)</text>
    <line x1="30" y1="65" x2="310" y2="65" stroke="#4a90c8" stroke-width="0.5"/>
    
    <text x="20" y="90" font-size="11" fill="#f0c869" font-weight="600">KEY INSIGHT</text>
    <text x="20" y="110" font-size="11.5" fill="#e8e8e8">준거점 대비 이익·손실을</text>
    <text x="20" y="126" font-size="11.5" fill="#e8e8e8">비대칭적으로 평가</text>
    
    <text x="20" y="155" font-size="11" fill="#f0c869" font-weight="600">CORE EQUATION</text>
    <rect x="20" y="165" width="300" height="32" rx="4" fill="#0a1a2a" stroke="#2a4060" stroke-width="0.5"/>
    <text x="170" y="186" text-anchor="middle" font-size="12" fill="#f5f5f5" font-style="italic">v(x) = x^α  or  −λ(−x)^β</text>
    
    <text x="20" y="220" font-size="11" fill="#b0d4f0">
      <tspan font-weight="600">λ ≈ 2.25</tspan>
      <tspan dx="8" fill="#a8b8c8">· 손실 2배 이상 크게 느낌</tspan>
    </text>
  </g>
  
  <!-- MA box -->
  <g transform="translate(430, 140)">
    <rect x="0" y="0" width="340" height="240" rx="10" fill="url(#maGrad)" stroke="#4a8a4a" stroke-width="1"/>
    <text x="170" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#f5f5f5">Mental Accounting</text>
    <text x="170" y="52" text-anchor="middle" font-size="11" fill="#c0e0c0" font-style="italic">Thaler (1985, 1999)</text>
    <line x1="30" y1="65" x2="310" y2="65" stroke="#6aaa6a" stroke-width="0.5"/>
    
    <text x="20" y="90" font-size="11" fill="#f0c869" font-weight="600">KEY INSIGHT</text>
    <text x="20" y="110" font-size="11.5" fill="#e8e8e8">돈은 fungible하지 않다</text>
    <text x="20" y="126" font-size="11.5" fill="#e8e8e8">출처·용도별 심리적 분리</text>
    
    <text x="20" y="155" font-size="11" fill="#f0c869" font-weight="600">CORE EQUATION</text>
    <rect x="20" y="165" width="300" height="32" rx="4" fill="#0a1a2a" stroke="#2a4060" stroke-width="0.5"/>
    <text x="170" y="186" text-anchor="middle" font-size="12" fill="#f5f5f5" font-style="italic">U(W) = Σ φ_k · u_k(W_k − R_k)</text>
    
    <text x="20" y="220" font-size="11" fill="#c0e0c0">
      <tspan font-weight="600">K accounts</tspan>
      <tspan dx="8" fill="#a8b8a8">· 각 계정별 다른 risk profile</tspan>
    </text>
  </g>
  
  <!-- SP/A box -->
  <g transform="translate(800, 140)">
    <rect x="0" y="0" width="340" height="240" rx="10" fill="url(#spaGrad)" stroke="#8a5aaa" stroke-width="1"/>
    <text x="170" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#f5f5f5">SP/A Theory</text>
    <text x="170" y="52" text-anchor="middle" font-size="11" fill="#e0c0e0" font-style="italic">Lopes (1987) · Lopes-Oden (1999)</text>
    <line x1="30" y1="65" x2="310" y2="65" stroke="#aa7aca" stroke-width="0.5"/>
    
    <text x="20" y="90" font-size="11" fill="#f0c869" font-weight="600">KEY INSIGHT</text>
    <text x="20" y="110" font-size="11.5" fill="#e8e8e8">Security + Potential + Aspiration</text>
    <text x="20" y="126" font-size="11.5" fill="#e8e8e8">세 축의 긴장이 의사결정 구성</text>
    
    <text x="20" y="155" font-size="11" fill="#f0c869" font-weight="600">CORE EQUATION</text>
    <rect x="20" y="165" width="300" height="32" rx="4" fill="#0a1a2a" stroke="#2a4060" stroke-width="0.5"/>
    <text x="170" y="186" text-anchor="middle" font-size="12" fill="#f5f5f5" font-style="italic">V(X) = f(SP(X), A(X; ρ))</text>
    
    <text x="20" y="220" font-size="11" fill="#e0c0e0">
      <tspan font-weight="600">Dual criterion</tspan>
      <tspan dx="8" fill="#c8b0c8">· aspiration이 독립 축</tspan>
    </text>
  </g>
  
  <!-- Convergence arrows -->
  <g>
    <line x1="230" y1="390" x2="540" y2="450" stroke="url(#goldGrad2)" stroke-width="2" marker-end="url(#arrow2)"/>
    <line x1="600" y1="390" x2="600" y2="450" stroke="url(#goldGrad2)" stroke-width="2" marker-end="url(#arrow2)"/>
    <line x1="970" y1="390" x2="660" y2="450" stroke="url(#goldGrad2)" stroke-width="2" marker-end="url(#arrow2)"/>
  </g>
  
  <!-- Common elements (middle strip) -->
  <g transform="translate(80, 400)">
    <text x="520" y="15" text-anchor="middle" font-size="12" fill="#d4a244" font-weight="600">공통 구조 (shared structural elements)</text>
  </g>
  
  <!-- GBI destination -->
  <g transform="translate(320, 475)">
    <rect x="0" y="0" width="560" height="110" rx="12" fill="url(#gbiGrad2)" stroke="#f0c869" stroke-width="1.5"/>
    <text x="280" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">
      Goal-Based Investing
    </text>
    <text x="280" y="60" text-anchor="middle" font-size="13" fill="#2a2a2a" font-style="italic">
      인간 의사결정 구조의 원형을 formalize한 최적화 프레임
    </text>
    <rect x="40" y="72" width="480" height="28" rx="4" fill="#1a1a1a"/>
    <text x="280" y="92" text-anchor="middle" font-size="12.5" fill="#f0c869" font-style="italic">
      V(W; G) = Σ φ_k · E^h[ v_k(W_k − H_k) · 1{W_k ≥ H_k} ]
    </text>
  </g>
  
  <!-- Common elements explained (3 tiles) -->
  <g transform="translate(80, 620)">
    <!-- Reference/Threshold/Aspiration -->
    <rect x="0" y="0" width="340" height="170" rx="8" fill="#1a2138" stroke="#3a4460" stroke-width="1"/>
    <text x="20" y="28" font-size="13" font-weight="700" fill="#f0c869">① 준거점·목표</text>
    <text x="20" y="52" font-size="11.5" fill="#e8e8e8">Reference Point · Threshold · Aspiration</text>
    <line x1="20" y1="65" x2="320" y2="65" stroke="#3a4460" stroke-width="0.5"/>
    <text x="20" y="88" font-size="11" fill="#a8b0c0">
      <tspan fill="#7ab8e0" font-weight="600">PT:</tspan>
      <tspan dx="6">value function의 꺾임점 x=0</tspan>
    </text>
    <text x="20" y="110" font-size="11" fill="#a8b0c0">
      <tspan fill="#8ac08a" font-weight="600">MA:</tspan>
      <tspan dx="6">계정별 목표금액 R_k</tspan>
    </text>
    <text x="20" y="132" font-size="11" fill="#a8b0c0">
      <tspan fill="#c08ac0" font-weight="600">SP/A:</tspan>
      <tspan dx="6">aspiration level ρ</tspan>
    </text>
    <text x="20" y="158" font-size="10.5" fill="#d4a244" font-style="italic">→ GBI의 H_i (목표금액)</text>
    
    <!-- Asymmetric Risk -->
    <rect x="360" y="0" width="340" height="170" rx="8" fill="#1a2138" stroke="#3a4460" stroke-width="1"/>
    <text x="380" y="28" font-size="13" font-weight="700" fill="#f0c869">② 비대칭 위험태도</text>
    <text x="380" y="52" font-size="11.5" fill="#e8e8e8">Asymmetric Risk Attitude</text>
    <line x1="380" y1="65" x2="680" y2="65" stroke="#3a4460" stroke-width="0.5"/>
    <text x="380" y="88" font-size="11" fill="#a8b0c0">
      <tspan fill="#7ab8e0" font-weight="600">PT:</tspan>
      <tspan dx="6">gain concave · loss convex</tspan>
    </text>
    <text x="380" y="110" font-size="11" fill="#a8b0c0">
      <tspan fill="#8ac08a" font-weight="600">MA:</tspan>
      <tspan dx="6">계정별 서로 다른 risk aversion</tspan>
    </text>
    <text x="380" y="132" font-size="11" fill="#a8b0c0">
      <tspan fill="#c08ac0" font-weight="600">SP/A:</tspan>
      <tspan dx="6">h(z) = q_s h_s + q_p h_p</tspan>
    </text>
    <text x="380" y="158" font-size="10.5" fill="#d4a244" font-style="italic">→ GBI의 Pr(W_T &lt; H) ≤ α</text>
    
    <!-- Non-Fungibility -->
    <rect x="720" y="0" width="340" height="170" rx="8" fill="#1a2138" stroke="#3a4460" stroke-width="1"/>
    <text x="740" y="28" font-size="13" font-weight="700" fill="#f0c869">③ 비-대체 부</text>
    <text x="740" y="52" font-size="11.5" fill="#e8e8e8">Non-Fungible Wealth</text>
    <line x1="740" y1="65" x2="1040" y2="65" stroke="#3a4460" stroke-width="0.5"/>
    <text x="740" y="88" font-size="11" fill="#a8b0c0">
      <tspan fill="#7ab8e0" font-weight="600">PT:</tspan>
      <tspan dx="6">framing·isolation 효과</tspan>
    </text>
    <text x="740" y="110" font-size="11" fill="#a8b0c0">
      <tspan fill="#8ac08a" font-weight="600">MA:</tspan>
      <tspan dx="6">K-account 명시적 분할</tspan>
    </text>
    <text x="740" y="132" font-size="11" fill="#a8b0c0">
      <tspan fill="#c08ac0" font-weight="600">SP/A:</tspan>
      <tspan dx="6">situational factor per goal</tspan>
    </text>
    <text x="740" y="158" font-size="10.5" fill="#d4a244" font-style="italic">→ GBI의 multi-bucket 구조</text>
  </g>

  <text x="1140" y="800" text-anchor="end" font-size="10" fill="#5a6478" font-style="italic">
    GBI Curriculum · Week 02 · Figure 2
  </text>
</svg>
