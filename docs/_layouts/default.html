<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

  <!-- GitHub Primer 다크 스타일 (강의노트 본문용) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.css">

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, sans-serif;
    }
    .site-nav {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 32px;
      border-bottom: 1px solid #30363d;
      font-size: 0.9rem;
    }
    .site-nav a {
      color: #58a6ff;
      text-decoration: none;
      margin-right: 16px;
    }
    .site-nav a:hover { color: #79c0ff; }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 32px 60px;
      background: transparent;
    }
    @media (max-width: 767px) {
      .markdown-body { padding: 20px 16px 40px; }
      .site-nav { padding: 12px 16px; }
    }
    /* Mermaid 다이어그램: 다크 페이지 안에 흰색 카드로 분리해 대비 확보 */
    .mermaid,
    .mermaid[data-processed="true"] {
      background: #ffffff !important;
      display: flex !important;
      justify-content: center;
      margin: 24px 0;
      padding: 20px !important;
      border-radius: 6px;
      overflow-x: auto;
      color-scheme: light;
    }
    .mermaid svg {
      background: #ffffff !important;
      max-width: 100%;
      height: auto;
    }
    /* Mermaid 노드의 모든 텍스트 요소를 강한 검정 + 굵기로 강제 */
    .mermaid .nodeLabel,
    .mermaid .edgeLabel,
    .mermaid .cluster-label,
    .mermaid .cluster text,
    .mermaid .titleText,
    .mermaid span.nodeLabel,
    .mermaid foreignObject div,
    .mermaid foreignObject span,
    .mermaid foreignObject p {
      color: #000000 !important;
      font-weight: 600 !important;
    }
    .mermaid text,
    .mermaid tspan {
      fill: #000000 !important;
      font-weight: 600 !important;
      stroke: none !important;
    }
    .mermaid .edgeLabel {
      background-color: #ffffff !important;
      padding: 2px 4px;
      border-radius: 3px;
    }
    /* 테두리·라인도 진하게 해서 전체 대비 강화 */
    .mermaid .node rect,
    .mermaid .node circle,
    .mermaid .node ellipse,
    .mermaid .node polygon,
    .mermaid .node path {
      stroke: #24292f !important;
      stroke-width: 1.5px !important;
    }
    .mermaid .edgePath .path,
    .mermaid .flowchart-link {
      stroke: #24292f !important;
      stroke-width: 1.5px !important;
    }
    .mermaid .arrowheadPath {
      fill: #24292f !important;
    }
    .mermaid .cluster rect {
      stroke: #57606a !important;
      stroke-width: 1.5px !important;
    }
    /* MathJax 수식이 너무 커지지 않도록 */
    mjx-container[display="true"] { overflow-x: auto; overflow-y: hidden; }
  </style>

  <!-- MathJax (LaTeX 수식) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: { fontCache: 'global' },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>

  <!-- Mermaid (flowchart·sequence·state 다이어그램) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // kramdown은 ```mermaid 펜스를 <pre><code class="language-mermaid">로 변환 →
      // Mermaid가 인식하는 <div class="mermaid">로 치환
      document.querySelectorAll('pre > code.language-mermaid').forEach(function (el) {
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        el.parentElement.replaceWith(div);
      });
      mermaid.initialize({
        startOnLoad: false,
        theme: 'base',
        securityLevel: 'loose',
        flowchart: { htmlLabels: true, curve: 'basis' },
        themeVariables: {
          // Mermaid 내부 팔레트를 고대비로 재정의
          background: '#ffffff',
          primaryColor: '#eef2ff',           // 노드 기본 배경 (연한 인디고)
          primaryTextColor: '#000000',       // 노드 글자
          primaryBorderColor: '#24292f',     // 노드 테두리
          secondaryColor: '#fef3c7',         // 보조 노드 배경 (연한 앰버)
          secondaryTextColor: '#000000',
          secondaryBorderColor: '#24292f',
          tertiaryColor: '#dcfce7',          // 3차 노드 배경 (연한 그린)
          tertiaryTextColor: '#000000',
          tertiaryBorderColor: '#24292f',
          lineColor: '#24292f',              // 엣지 라인
          textColor: '#000000',              // 일반 텍스트
          mainBkg: '#eef2ff',
          nodeTextColor: '#000000',
          titleColor: '#000000',
          edgeLabelBackground: '#ffffff',
          clusterBkg: '#f6f8fa',             // subgraph 배경
          clusterBorder: '#57606a',
          labelBackground: '#ffffff',
          noteBkgColor: '#fff8c5',
          noteTextColor: '#000000',
          noteBorderColor: '#57606a'
        }
      });
      mermaid.run();
    });
  </script>
</head>
<body>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}">← 목차</a>
    <a href="{{ '/GBI_Curriculum_Syllabus.html' | relative_url }}">Syllabus</a>
    <a href="https://github.com/keerhee/GBI-curriculum" target="_blank" rel="noopener">GitHub 저장소</a>
  </nav>
  <article class="markdown-body">
    {{ content }}
  </article>
</body>
</html>
