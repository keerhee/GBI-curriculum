<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

  <!-- GitHub Primer 다크 스타일 (강의노트 본문용) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.css">

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, sans-serif;
    }
    .site-nav {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 32px;
      border-bottom: 1px solid #30363d;
      font-size: 0.9rem;
    }
    .site-nav a {
      color: #58a6ff;
      text-decoration: none;
      margin-right: 16px;
    }
    .site-nav a:hover { color: #79c0ff; }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 32px 60px;
      background: transparent;
    }
    @media (max-width: 767px) {
      .markdown-body { padding: 20px 16px 40px; }
      .site-nav { padding: 12px 16px; }
    }
    /* Mermaid 다이어그램: 다크 페이지에 자연스럽게 녹아드는 스타일
       - 박스 fill 투명
       - 글자는 본문과 동일한 #e6edf3
       - 테두리·선은 연회색(#8b949e) */
    .mermaid,
    .mermaid[data-processed="true"] {
      background: transparent !important;
      display: flex;
      justify-content: center;
      margin: 24px 0;
      padding: 8px 0;
      overflow-x: auto;
    }
    .mermaid svg {
      background: transparent !important;
      max-width: 100%;
      height: auto;
    }
    /* 모든 텍스트 요소: 본문과 같은 밝은 회백색 */
    .mermaid .nodeLabel,
    .mermaid .edgeLabel,
    .mermaid .cluster-label,
    .mermaid .cluster text,
    .mermaid .titleText,
    .mermaid span.nodeLabel,
    .mermaid foreignObject div,
    .mermaid foreignObject span,
    .mermaid foreignObject p {
      color: #e6edf3 !important;
      font-weight: 500 !important;
    }
    .mermaid text,
    .mermaid tspan {
      fill: #e6edf3 !important;
      font-weight: 500 !important;
      stroke: none !important;
    }
    /* 엣지 라벨: 페이지 배경과 같은 색으로 선을 가림 */
    .mermaid .edgeLabel {
      background-color: #0d1117 !important;
      padding: 2px 4px;
      border-radius: 3px;
    }
    /* 노드 박스: fill 투명, 테두리만 연회색 */
    .mermaid .node rect,
    .mermaid .node circle,
    .mermaid .node ellipse,
    .mermaid .node polygon,
    .mermaid .node path {
      fill: transparent !important;
      stroke: #8b949e !important;
      stroke-width: 1.5px !important;
    }
    /* 엣지 선도 동일 회색 */
    .mermaid .edgePath .path,
    .mermaid .flowchart-link {
      stroke: #8b949e !important;
      stroke-width: 1.5px !important;
      fill: none !important;
    }
    .mermaid .arrowheadPath,
    .mermaid marker path {
      fill: #8b949e !important;
      stroke: #8b949e !important;
    }
    /* 클러스터(subgraph): 살짝 구분되도록 옅은 배경 + 점선 테두리 */
    .mermaid .cluster rect {
      fill: #161b22 !important;
      stroke: #30363d !important;
      stroke-width: 1px !important;
      stroke-dasharray: 4 3;
      rx: 6;
      ry: 6;
    }
    /* MathJax 수식이 너무 커지지 않도록 */
    mjx-container[display="true"] { overflow-x: auto; overflow-y: hidden; }
  </style>

  <!-- MathJax (LaTeX 수식) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: { fontCache: 'global' },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>

  <!-- Mermaid (flowchart·sequence·state 다이어그램) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // kramdown은 ```mermaid 펜스를 <pre><code class="language-mermaid">로 변환 →
      // Mermaid가 인식하는 <div class="mermaid">로 치환
      document.querySelectorAll('pre > code.language-mermaid').forEach(function (el) {
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        el.parentElement.replaceWith(div);
      });
      mermaid.initialize({
        startOnLoad: false,
        theme: 'base',
        securityLevel: 'loose',
        flowchart: { htmlLabels: true, curve: 'basis' },
        themeVariables: {
          // 다크 페이지에 녹아드는 팔레트 (GitHub Primer Dark 톤)
          background: 'transparent',
          primaryColor: 'transparent',
          primaryTextColor: '#e6edf3',
          primaryBorderColor: '#8b949e',
          secondaryColor: 'transparent',
          secondaryTextColor: '#e6edf3',
          secondaryBorderColor: '#8b949e',
          tertiaryColor: 'transparent',
          tertiaryTextColor: '#e6edf3',
          tertiaryBorderColor: '#8b949e',
          lineColor: '#8b949e',
          textColor: '#e6edf3',
          mainBkg: 'transparent',
          nodeTextColor: '#e6edf3',
          titleColor: '#e6edf3',
          edgeLabelBackground: '#0d1117',
          clusterBkg: '#161b22',
          clusterBorder: '#30363d',
          labelBackground: '#0d1117',
          noteBkgColor: '#161b22',
          noteTextColor: '#e6edf3',
          noteBorderColor: '#30363d'
        }
      });
      mermaid.run();
    });
  </script>
</head>
<body>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}">← 목차</a>
    <a href="{{ '/GBI_Curriculum_Syllabus.html' | relative_url }}">Syllabus</a>
    <a href="https://github.com/keerhee/GBI-curriculum" target="_blank" rel="noopener">GitHub 저장소</a>
  </nav>
  <article class="markdown-body">
    {{ content }}
  </article>
</body>
</html>
