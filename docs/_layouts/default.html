<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

  <!-- GitHub Primer 다크 스타일 (강의노트 본문용) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.css">

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, sans-serif;
    }
    .site-nav {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 32px;
      border-bottom: 1px solid #30363d;
      font-size: 0.9rem;
    }
    .site-nav a {
      color: #58a6ff;
      text-decoration: none;
      margin-right: 16px;
    }
    .site-nav a:hover { color: #79c0ff; }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 32px 60px;
      background: transparent;
    }
    @media (max-width: 767px) {
      .markdown-body { padding: 20px 16px 40px; }
      .site-nav { padding: 12px 16px; }
    }
    /* Mermaid 다이어그램: 다크 페이지 안에 흰색 카드로 분리해 대비 확보 */
    .mermaid {
      background: #ffffff;
      display: flex;
      justify-content: center;
      margin: 24px 0;
      padding: 20px;
      border-radius: 6px;
      overflow-x: auto;
    }
    /* Mermaid light theme 노드의 텍스트가 확실히 보이도록 강제 */
    .mermaid .nodeLabel,
    .mermaid .edgeLabel,
    .mermaid .cluster-label,
    .mermaid span.nodeLabel,
    .mermaid foreignObject div {
      color: #1f2328 !important;
    }
    .mermaid .edgeLabel {
      background-color: #ffffff !important;
      padding: 2px 4px;
    }
    .mermaid text {
      fill: #1f2328 !important;
    }
    /* MathJax 수식이 너무 커지지 않도록 */
    mjx-container[display="true"] { overflow-x: auto; overflow-y: hidden; }
  </style>

  <!-- MathJax (LaTeX 수식) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: { fontCache: 'global' },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>

  <!-- Mermaid (flowchart·sequence·state 다이어그램) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // kramdown은 ```mermaid 펜스를 <pre><code class="language-mermaid">로 변환 →
      // Mermaid가 인식하는 <div class="mermaid">로 치환
      document.querySelectorAll('pre > code.language-mermaid').forEach(function (el) {
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        el.parentElement.replaceWith(div);
      });
      mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose',
        flowchart: { htmlLabels: true, curve: 'basis' }
      });
      mermaid.run();
    });
  </script>
</head>
<body>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}">← 목차</a>
    <a href="{{ '/GBI_Curriculum_Syllabus.html' | relative_url }}">Syllabus</a>
    <a href="https://github.com/keerhee/GBI-curriculum" target="_blank" rel="noopener">GitHub 저장소</a>
  </nav>
  <article class="markdown-body">
    {{ content }}
  </article>
</body>
</html>
