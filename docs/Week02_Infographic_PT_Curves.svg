<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Inter', 'Noto Sans KR', -apple-system, sans-serif">
  <rect width="1200" height="820" fill="#0f1629"/>

  <defs>
    <linearGradient id="goldGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a244"/>
      <stop offset="100%" stop-color="#f0c869"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#f5f5f5">
    Prospect Theory · Visualized
  </text>
  <text x="600" y="78" text-anchor="middle" font-size="15" fill="url(#goldGrad3)" font-weight="500">
    Value Function v(x)과 Probability Weighting w(p)의 형상
  </text>
  <line x1="200" y1="100" x2="1000" y2="100" stroke="#d4a244" stroke-width="1" opacity="0.4"/>

  <!-- LEFT: Value Function -->
  <g transform="translate(50, 140)">
    <text x="260" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#f0c869">
      Value Function · v(x)
    </text>
    <text x="260" y="45" text-anchor="middle" font-size="11" fill="#a8b0c0" font-style="italic">
      α = β = 0.88,  λ = 2.25  (Tversky-Kahneman 1992)
    </text>

    <!-- Chart background -->
    <rect x="10" y="60" width="500" height="340" rx="6" fill="#0a1a2a" stroke="#2a3048" stroke-width="0.5"/>

    <!-- Axes (chart area: x 10-490, y 70-380, center (250, 200)) -->
    <line x1="10" y1="200" x2="490" y2="200" stroke="#4a5470" stroke-width="1"/>
    <line x1="250" y1="60" x2="250" y2="400" stroke="#4a5470" stroke-width="1"/>

    <!-- Axis labels -->
    <text x="495" y="196" font-size="11" fill="#a8b0c0">x</text>
    <text x="254" y="72" font-size="11" fill="#a8b0c0">v(x)</text>

    <!-- Grid lines (subtle) -->
    <line x1="125" y1="60" x2="125" y2="400" stroke="#2a3048" stroke-width="0.3" stroke-dasharray="2,3"/>
    <line x1="375" y1="60" x2="375" y2="400" stroke="#2a3048" stroke-width="0.3" stroke-dasharray="2,3"/>
    <line x1="10" y1="110" x2="490" y2="110" stroke="#2a3048" stroke-width="0.3" stroke-dasharray="2,3"/>
    <line x1="10" y1="290" x2="490" y2="290" stroke="#2a3048" stroke-width="0.3" stroke-dasharray="2,3"/>

    <!-- x tick labels -->
    <text x="125" y="215" text-anchor="middle" font-size="10" fill="#8a95a8">−50</text>
    <text x="250" y="215" text-anchor="middle" font-size="10" fill="#8a95a8">0</text>
    <text x="375" y="215" text-anchor="middle" font-size="10" fill="#8a95a8">+50</text>

    <!-- Value function paths -->
    <path d="M 10 217.7 L 14.6 216.3 L 19.2 214.9 L 23.8 213.6 L 28.4 212.2 L 33.0 210.8 L 37.6 209.4 L 42.2 208.0 L 46.8 206.6 L 51.4 205.2 L 56.0 203.8 L 60.6 202.4 L 65.2 201.0 L 69.8 199.6 L 74.4 198.2 L 79.0 196.8 L 83.6 195.3 L 88.2 193.9 L 92.8 192.5 L 97.4 191.0 L 102.0 189.6 L 106.6 188.1 L 111.2 186.6 L 115.8 185.2 L 120.4 183.7 L 125.0 182.2 L 129.6 180.7 L 134.2 179.2 L 138.8 177.7 L 143.4 176.2 L 148.0 174.7 L 152.6 173.2 L 157.2 171.6 L 161.8 170.1 L 166.4 168.5 L 171.0 166.9 L 175.6 165.3 L 180.2 163.7 L 184.8 162.1 L 189.4 160.5 L 194.0 158.8 L 198.6 157.2 L 203.2 155.5 L 207.8 153.8 L 212.4 152.0 L 217.0 150.2 L 221.6 148.4 L 226.2 146.5 L 230.8 144.6 L 235.4 142.5 L 240.0 140.0"
          transform="translate(10, 60)"
          stroke="#e07a7a" stroke-width="2.5" fill="none"/>

    <path d="M 240.0 140.0 L 244.6 138.9 L 249.2 138.0 L 253.8 137.1 L 258.4 136.3 L 263.0 135.4 L 267.6 134.7 L 272.2 133.9 L 276.8 133.1 L 281.4 132.4 L 286.0 131.6 L 290.6 130.9 L 295.2 130.2 L 299.8 129.4 L 304.4 128.7 L 309.0 128.0 L 313.6 127.3 L 318.2 126.6 L 322.8 125.9 L 327.4 125.3 L 332.0 124.6 L 336.6 123.9 L 341.2 123.2 L 345.8 122.6 L 350.4 121.9 L 355.0 121.2 L 359.6 120.6 L 364.2 119.9 L 368.8 119.3 L 373.4 118.6 L 378.0 118.0 L 382.6 117.3 L 387.2 116.7 L 391.8 116.0 L 396.4 115.4 L 401.0 114.8 L 405.6 114.1 L 410.2 113.5 L 414.8 112.9 L 419.4 112.3 L 424.0 111.6 L 428.6 111.0 L 433.2 110.4 L 437.8 109.8 L 442.4 109.1 L 447.0 108.5 L 451.6 107.9 L 456.2 107.3 L 460.8 106.7 L 465.4 106.1 L 470.0 105.5"
          transform="translate(10, 60)"
          stroke="#4cbf7a" stroke-width="2.5" fill="none"/>

    <!-- Reference point marker -->
    <circle cx="250" cy="200" r="5" fill="#f0c869" stroke="#1a1a1a" stroke-width="1"/>
    <text x="258" y="192" font-size="10" fill="#f0c869" font-weight="600">준거점</text>

    <!-- Gain/Loss labels -->
    <rect x="350" y="115" width="140" height="44" rx="4" fill="#1a4030" stroke="#4cbf7a" stroke-width="0.5"/>
    <text x="420" y="131" text-anchor="middle" font-size="11" fill="#7ae0a0" font-weight="600">이익 영역</text>
    <text x="420" y="147" text-anchor="middle" font-size="10" fill="#a8d8b8">concave · 위험회피</text>

    <rect x="20" y="235" width="140" height="44" rx="4" fill="#402a2a" stroke="#e07a7a" stroke-width="0.5"/>
    <text x="90" y="251" text-anchor="middle" font-size="11" fill="#ff9a9a" font-weight="600">손실 영역</text>
    <text x="90" y="267" text-anchor="middle" font-size="10" fill="#e0b8b8">convex · 위험선호</text>

    <!-- Loss aversion callout -->
    <g transform="translate(30, 350)">
      <rect x="0" y="0" width="460" height="40" rx="6" fill="#2a1a1a" stroke="#e07a7a" stroke-width="1"/>
      <text x="230" y="18" text-anchor="middle" font-size="11" fill="#ffb8b8" font-weight="600">
        Loss Aversion · λ = 2.25
      </text>
      <text x="230" y="33" text-anchor="middle" font-size="10.5" fill="#d8b8b8">
        |v(−100)| = 130.4   vs   v(+100) = 57.9   →  손실 쪽 기울기 2.25배
      </text>
    </g>
  </g>

  <!-- RIGHT: Probability Weighting -->
  <g transform="translate(620, 140)">
    <text x="260" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#f0c869">
      Probability Weighting · w(p)
    </text>
    <text x="260" y="45" text-anchor="middle" font-size="11" fill="#a8b0c0" font-style="italic">
      γ = 0.61  (inverse S-shape)
    </text>

    <!-- Chart bg -->
    <rect x="10" y="60" width="500" height="340" rx="6" fill="#0a1a2a" stroke="#2a3048" stroke-width="0.5"/>

    <!-- Axes for unit square (0..1, 0..1) mapped to (40..440, 340..60) -->
    <line x1="40" y1="340" x2="460" y2="340" stroke="#4a5470" stroke-width="1"/>
    <line x1="40" y1="60" x2="40" y2="340" stroke="#4a5470" stroke-width="1"/>

    <!-- Tick labels -->
    <text x="40" y="358" text-anchor="middle" font-size="10" fill="#8a95a8">0</text>
    <text x="250" y="358" text-anchor="middle" font-size="10" fill="#8a95a8">0.5</text>
    <text x="460" y="358" text-anchor="middle" font-size="10" fill="#8a95a8">1</text>
    <text x="32" y="344" text-anchor="end" font-size="10" fill="#8a95a8">0</text>
    <text x="32" y="204" text-anchor="end" font-size="10" fill="#8a95a8">0.5</text>
    <text x="32" y="64" text-anchor="end" font-size="10" fill="#8a95a8">1</text>

    <text x="465" y="340" font-size="11" fill="#a8b0c0">p</text>
    <text x="44" y="55" font-size="11" fill="#a8b0c0">w(p)</text>

    <!-- Diagonal reference -->
    <line x1="40" y1="340" x2="460" y2="60" stroke="#4a5470" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="400" y="100" font-size="10" fill="#6a7488" font-style="italic">w(p) = p (linear)</text>

    <!-- W(p) path - adjusted -->
    <path d="M 40.4 336.2 L 44.4 324.8 L 48.5 318.3 L 52.5 313.2 L 56.5 309.0 L 60.6 305.3 L 64.6 302.0 L 68.6 299.0 L 72.7 296.2 L 76.7 293.6 L 80.7 291.1 L 84.8 288.8 L 88.8 286.6 L 92.8 284.5 L 96.9 282.5 L 100.9 280.6 L 104.9 278.7 L 108.9 276.9 L 113.0 275.1 L 117.0 273.4 L 121.0 271.8 L 125.1 270.1 L 129.1 268.6 L 133.1 267.0 L 137.2 265.5 L 141.2 264.0 L 145.2 262.5 L 149.3 261.0 L 153.3 259.6 L 157.3 258.2 L 161.4 256.7 L 165.4 255.4 L 169.4 254.0 L 173.5 252.6 L 177.5 251.2 L 181.5 249.9 L 185.6 248.6 L 189.6 247.2 L 193.6 245.9 L 197.7 244.6 L 201.7 243.2 L 205.7 241.9 L 209.8 240.6 L 213.8 239.3 L 217.8 238.0 L 221.9 236.6 L 225.9 235.3 L 229.9 234.0 L 234.0 232.6 L 238.0 231.3 L 242.0 230.0 L 246.0 228.6 L 250.1 227.2 L 254.1 225.9 L 258.1 224.5 L 262.2 223.1 L 266.2 221.7 L 270.2 220.3 L 274.3 218.9 L 278.3 217.4 L 282.3 215.9 L 286.4 214.5 L 290.4 213.0 L 294.4 211.4 L 298.5 209.9 L 302.5 208.3 L 306.5 206.7 L 310.6 205.1 L 314.6 203.5 L 318.6 201.8 L 322.7 200.1 L 326.7 198.3 L 330.7 196.5 L 334.8 194.7 L 338.8 192.8 L 342.8 190.9 L 346.9 188.9 L 350.9 186.9 L 354.9 184.8 L 359.0 182.6 L 363.0 180.4 L 367.0 178.1 L 371.1 175.7 L 375.1 173.2 L 379.1 170.6 L 383.1 167.9 L 387.2 165.1 L 391.2 162.1 L 395.2 158.9 L 399.3 155.6 L 403.3 152.0 L 407.3 148.2 L 411.4 144.0 L 415.4 139.5 L 419.4 134.5 L 423.5 128.9 L 427.5 122.4 L 431.5 114.6 L 435.6 104.3"
          stroke="#f0c869" stroke-width="2.5" fill="none"/>

    <!-- Annotations -->
    <g>
      <line x1="90" y1="310" x2="140" y2="280" stroke="#7ae0a0" stroke-width="0.8"/>
      <rect x="145" y="262" width="190" height="36" rx="4" fill="#1a3a2a" stroke="#4cbf7a" stroke-width="0.5"/>
      <text x="240" y="278" text-anchor="middle" font-size="10.5" fill="#c0e8c0" font-weight="600">작은 확률 과대평가</text>
      <text x="240" y="292" text-anchor="middle" font-size="9.5" fill="#a8c8a8">→ 로또·아주 낮은 재난 확률</text>
    </g>

    <g>
      <line x1="410" y1="140" x2="380" y2="180" stroke="#e07a7a" stroke-width="0.8"/>
      <rect x="215" y="180" width="200" height="36" rx="4" fill="#3a1a1a" stroke="#e07a7a" stroke-width="0.5"/>
      <text x="315" y="196" text-anchor="middle" font-size="10.5" fill="#ffc8c8" font-weight="600">큰 확률 과소평가</text>
      <text x="315" y="210" text-anchor="middle" font-size="9.5" fill="#d8b8b8">→ "90%면 확실하지" 착각</text>
    </g>

    <!-- Implication tag -->
    <g transform="translate(30, 350)">
      <rect x="0" y="0" width="460" height="40" rx="6" fill="#2a2a1a" stroke="#f0c869" stroke-width="1"/>
      <text x="230" y="18" text-anchor="middle" font-size="11" fill="#f5e0a0" font-weight="600">
        Friedman-Savage Puzzle 해명
      </text>
      <text x="230" y="33" text-anchor="middle" font-size="10.5" fill="#d8d0a8">
        동일인이 보험(작은 손실확률 과대)과 복권(작은 대박확률 과대)을 동시에 구매
      </text>
    </g>
  </g>

  <!-- Bottom: GBI implication -->
  <g transform="translate(60, 580)">
    <rect x="0" y="0" width="1080" height="200" rx="10" fill="#0a1a2a" stroke="#1e5f8e" stroke-width="1"/>
    <text x="30" y="35" font-size="15" font-weight="700" fill="#f0c869">GBI 관점에서의 함의</text>
    <line x1="30" y1="48" x2="1050" y2="48" stroke="#2a4060" stroke-width="0.5"/>

    <g transform="translate(30, 70)">
      <text x="0" y="0" font-size="12" fill="#d8d8d8">
        <tspan fill="#f0c869" font-weight="700">[1] 준거점이 목표금액이 된다.</tspan>
      </text>
      <text x="0" y="22" font-size="11.5" fill="#a8b0c0">
        GBI는 준거점을 $H_i$로 명시 설정. $W_T &lt; H_i$는 "손실 영역"(convex), $W_T &gt; H_i$는 "이익 영역"(concave).
      </text>

      <text x="0" y="55" font-size="12" fill="#d8d8d8">
        <tspan fill="#f0c869" font-weight="700">[2] 목표 미달 손실이 λ배 증폭된다.</tspan>
      </text>
      <text x="0" y="77" font-size="11.5" fill="#a8b0c0">
        교육자금 미달 1,000만 원 ≈ 달성 초과 2,250만 원의 심리적 충격. 이것이 ESSENTIAL 목표의 99% 확률 요구의 근거.
      </text>

      <text x="0" y="110" font-size="12" fill="#d8d8d8">
        <tspan fill="#f0c869" font-weight="700">[3] 작은 확률 과대평가 → Aspirational 투자 설명.</tspan>
      </text>
      <text x="0" y="132" font-size="11.5" fill="#a8b0c0">
        10–30% 확률의 "부의 극적 확대" 목표가 존재할 수 있는 이유 = Probability Weighting의 inverse-S. Chhabra의 3-bucket이 심리학적 기반을 갖는 지점.
      </text>
    </g>
  </g>

  <text x="1140" y="800" text-anchor="end" font-size="10" fill="#5a6478" font-style="italic">
    GBI Curriculum · Week 02 · Figure 1
  </text>
</svg>