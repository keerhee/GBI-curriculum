    <text x="30" y="92" font-size="11" fill="#a8b0c0">
      Retirement은 bond 73%로 보수, Bequest는 −228% bond(공매도!)·+188% stock·+140% commodity의 공격적 레버리지. 같은 투자자의 세 계좌가 서로 정반대 방향.
    </text>

    <text x="30" y="120" font-size="12" fill="#d8d8d8">
      <tspan fill="#f0c869" font-weight="700">② Aggregate는 MV frontier 위에 정확히 위치한다.</tspan>
    </text>
    <text x="30" y="140" font-size="11" fill="#a8b0c0">
      Aggregate (σ=0.148, μ=0.077)은 수치적으로 MV 효율선 위. Aggregate weight = (0.00, 0.56, 0.44)는 완벽히 MV 효율 포트폴리오 형태 — Das-Markowitz Theorem의 직접 검증.
    </text>

    <text x="30" y="168" font-size="12" fill="#d8d8d8">
      <tspan fill="#f0c869" font-weight="700">③ "행동재무 해석 + 전통 MV 계산" 이 동시에 가능하다.</tspan>
    </text>
    <text x="30" y="188" font-size="11" fill="#a8b0c0">
      투자자는 (H, α, π)로 사고하고, 엔진은 MV로 계산한다. GBI가 최적화의 부담 없이 행동재무적 해석을 추가할 수 있는 수학적 근거.
    </text>
    <text x="30" y="208" font-size="10.5" fill="#7a8598" font-style="italic">
