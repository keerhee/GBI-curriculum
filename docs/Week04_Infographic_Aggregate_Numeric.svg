    <text x="210" y="132" font-size="10.5" fill="#d0d0d0">0.10</text>
    <text x="260" y="132" font-size="10" fill="#b0d4f0" font-family="monospace">(0.10, 0.50, 0.40)</text>
    <text x="455" y="132" font-size="10.5" fill="#d0d0d0">0.0711</text>
    <text x="510" y="132" font-size="10.5" fill="#d0d0d0">0.1335</text>
    <circle cx="25" cy="152" r="4" fill="#e07a7a"/>
