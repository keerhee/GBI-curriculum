<!-- Fallback: Primer theme이 적용된 경우에도 Mermaid/MathJax를 주입 -->
<!-- 내 _layouts/default.html이 적용되면 중복되지만 무해 (__gbiMermaidInit 가드) -->

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  (function () {
    if (window.__gbiMermaidInit) return;
    window.__gbiMermaidInit = true;
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('pre > code.language-mermaid').forEach(function (el) {
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        el.parentElement.replaceWith(div);
      });
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          securityLevel: 'loose',
          flowchart: { htmlLabels: true, curve: 'basis' },
          themeVariables: {
            background: 'transparent',
            primaryColor: 'transparent',
            primaryTextColor: '#e6edf3',
            primaryBorderColor: '#8b949e',
            secondaryColor: 'transparent',
            secondaryTextColor: '#e6edf3',
            secondaryBorderColor: '#8b949e',
            tertiaryColor: 'transparent',
            tertiaryTextColor: '#e6edf3',
            tertiaryBorderColor: '#8b949e',
            lineColor: '#8b949e',
            textColor: '#e6edf3',
            mainBkg: 'transparent',
            nodeTextColor: '#e6edf3',
            titleColor: '#e6edf3',
            edgeLabelBackground: '#0d1117',
            clusterBkg: '#161b22',
            clusterBorder: '#30363d',
            labelBackground: '#0d1117',
            noteBkgColor: '#161b22',
            noteTextColor: '#e6edf3',
            noteBorderColor: '#30363d'
          }
        });
        mermaid.run();
      }
    });
  })();
</script>

<script>
  window.MathJax = window.MathJax || {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    svg: { fontCache: 'global' },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>
