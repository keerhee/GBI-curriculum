<!-- Fallback: Primer theme이 적용된 경우에도 Mermaid/MathJax를 주입 -->
<!-- 내 _layouts/default.html이 적용되면 중복되지만 무해 (스크립트가 이미 있으면 mermaid 변수가 재할당될 뿐) -->

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  (function () {
    if (window.__gbiMermaidInit) return;
    window.__gbiMermaidInit = true;
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('pre > code.language-mermaid').forEach(function (el) {
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        el.parentElement.replaceWith(div);
      });
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          securityLevel: 'loose',
          flowchart: { htmlLabels: true, curve: 'basis' },
          themeVariables: {
            background: '#ffffff',
            primaryColor: '#eef2ff',
            primaryTextColor: '#000000',
            primaryBorderColor: '#24292f',
            secondaryColor: '#fef3c7',
            secondaryTextColor: '#000000',
            secondaryBorderColor: '#24292f',
            tertiaryColor: '#dcfce7',
            tertiaryTextColor: '#000000',
            tertiaryBorderColor: '#24292f',
            lineColor: '#24292f',
            textColor: '#000000',
            mainBkg: '#eef2ff',
            nodeTextColor: '#000000',
            titleColor: '#000000',
            edgeLabelBackground: '#ffffff',
            clusterBkg: '#f6f8fa',
            clusterBorder: '#57606a',
            labelBackground: '#ffffff',
            noteBkgColor: '#fff8c5',
            noteTextColor: '#000000',
            noteBorderColor: '#57606a'
          }
        });
        mermaid.run();
      }
    });
  })();
</script>

<script>
  window.MathJax = window.MathJax || {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    svg: { fontCache: 'global' },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>

    margin: 24px 0;

  }
  .mermaid svg {
    background: #ffffff !important;

  .mermaid .nodeLabel,

  .mermaid .titleText,
  .mermaid span.nodeLabel,
  .mermaid foreignObject div,
  .mermaid foreignObject span,
  .mermaid foreignObject p {
    color: #000000 !important;
    font-weight: 600 !important;
  }
  .mermaid text,
  .mermaid tspan {
    fill: #000000 !important;
    font-weight: 600 !important;

  }
  .mermaid .edgeLabel {
