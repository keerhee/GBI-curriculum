<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="'Inter', 'Noto Sans KR', -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1200" height="780" fill="#0f1629"/>
  
  <!-- Gold accent gradient -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a244"/>
      <stop offset="100%" stop-color="#f0c869"/>
    </linearGradient>
    <linearGradient id="mptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4660"/>
      <stop offset="100%" stop-color="#2a3248"/>
    </linearGradient>
    <linearGradient id="gbiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e5f8e"/>
      <stop offset="100%" stop-color="#164669"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a244"/>
      <stop offset="100%" stop-color="#f4d78c"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#f0c869"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#f5f5f5">
    From Markowitz to Goal-Based Investing
  </text>
  <text x="600" y="82" text-anchor="middle" font-size="16" fill="url(#goldGrad)" font-weight="500">
    Week 1 · 패러다임 전환의 해부
  </text>
  
  <!-- Divider -->
  <line x1="200" y1="105" x2="1000" y2="105" stroke="#d4a244" stroke-width="1" opacity="0.4"/>
  
  <!-- Left panel: MPT -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="490" height="560" rx="12" fill="url(#mptGrad)" stroke="#4a5670" stroke-width="1"/>
    
    <!-- Header -->
    <text x="245" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">
      Modern Portfolio Theory
    </text>
    <text x="245" y="62" text-anchor="middle" font-size="13" fill="#a0a8b8" font-style="italic">
      Markowitz (1952)
    </text>
    
    <line x1="60" y1="80" x2="430" y2="80" stroke="#5a6478" stroke-width="0.5"/>
    
    <!-- Objective -->
    <text x="30" y="115" font-size="12" fill="#d4a244" font-weight="600">OBJECTIVE</text>
    <rect x="30" y="125" width="430" height="56" rx="6" fill="#1a2138" stroke="#3a4460" stroke-width="0.5"/>
    <text x="245" y="148" text-anchor="middle" font-size="14" fill="#e8e8e8" font-style="italic">
      max  E[R] − (λ/2)·Var(R)
    </text>
    <text x="245" y="168" text-anchor="middle" font-size="12" fill="#8a95a8">
      벤치마크 대비 초과수익
    </text>
    
    <!-- Risk definition -->
    <text x="30" y="210" font-size="12" fill="#d4a244" font-weight="600">RISK</text>
    <rect x="30" y="220" width="430" height="46" rx="6" fill="#1a2138" stroke="#3a4460" stroke-width="0.5"/>
    <text x="245" y="247" text-anchor="middle" font-size="14" fill="#e8e8e8">
      Variance / Tracking Error
    </text>
    
    <!-- Horizon -->
    <text x="30" y="295" font-size="12" fill="#d4a244" font-weight="600">HORIZON</text>
    <rect x="30" y="305" width="430" height="46" rx="6" fill="#1a2138" stroke="#3a4460" stroke-width="0.5"/>
    <text x="245" y="332" text-anchor="middle" font-size="14" fill="#e8e8e8">
      Single Period
    </text>
    
    <!-- Wealth treatment -->
    <text x="30" y="380" font-size="12" fill="#d4a244" font-weight="600">WEALTH</text>
    <rect x="30" y="390" width="430" height="46" rx="6" fill="#1a2138" stroke="#3a4460" stroke-width="0.5"/>
    <text x="245" y="417" text-anchor="middle" font-size="14" fill="#e8e8e8">
      Fungible (단일 풀)
    </text>
    
    <!-- Limitation tag -->
    <rect x="30" y="465" width="430" height="72" rx="6" fill="#3a2a2a" stroke="#b85c5c" stroke-width="1"/>
    <text x="245" y="487" text-anchor="middle" font-size="12" fill="#ff8a8a" font-weight="600">⚠ 구조적 한계</text>
    <text x="245" y="509" text-anchor="middle" font-size="12" fill="#d8b8b8">
      다목표·행동편향·동적성·세제
    </text>
    <text x="245" y="527" text-anchor="middle" font-size="12" fill="#d8b8b8">
      현실의 모든 축이 누락
    </text>
  </g>
  
  <!-- Center transition arrow -->
  <g transform="translate(550, 390)">
    <line x1="10" y1="30" x2="90" y2="30" stroke="url(#arrowGrad)" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="50" y="15" text-anchor="middle" font-size="11" fill="#d4a244" font-weight="600">Chhabra</text>
    <text x="50" y="55" text-anchor="middle" font-size="11" fill="#d4a244" font-weight="600">2005</text>
  </g>
  
  <!-- Right panel: GBI -->
  <g transform="translate(650, 140)">
    <rect x="0" y="0" width="490" height="560" rx="12" fill="url(#gbiGrad)" stroke="#2a7bbb" stroke-width="1"/>
    
    <!-- Header -->
    <text x="245" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#f5f5f5">
      Goal-Based Investing
    </text>
    <text x="245" y="62" text-anchor="middle" font-size="13" fill="#b0d4f0" font-style="italic">
      Chhabra · Brunel · Das-Statman · Martellini
    </text>
    
    <line x1="60" y1="80" x2="430" y2="80" stroke="#4a90c8" stroke-width="0.5"/>
    
    <!-- Objective -->
    <text x="30" y="115" font-size="12" fill="#f0c869" font-weight="600">OBJECTIVE</text>
    <rect x="30" y="125" width="430" height="56" rx="6" fill="#0f3a5c" stroke="#2a7bbb" stroke-width="0.5"/>
    <text x="245" y="148" text-anchor="middle" font-size="14" fill="#f5f5f5" font-style="italic">
      max  Σ ω_i · Pr(W_Ti ≥ H_i)
    </text>
    <text x="245" y="168" text-anchor="middle" font-size="12" fill="#b0d4f0">
      목표별 달성확률의 가중합
    </text>
    
    <!-- Risk definition -->
    <text x="30" y="210" font-size="12" fill="#f0c869" font-weight="600">RISK</text>
    <rect x="30" y="220" width="430" height="46" rx="6" fill="#0f3a5c" stroke="#2a7bbb" stroke-width="0.5"/>
    <text x="245" y="247" text-anchor="middle" font-size="14" fill="#f5f5f5">
      Pr(W_T &lt; H) · Shortfall
    </text>
    
    <!-- Horizon -->
    <text x="30" y="295" font-size="12" fill="#f0c869" font-weight="600">HORIZON</text>
    <rect x="30" y="305" width="430" height="46" rx="6" fill="#0f3a5c" stroke="#2a7bbb" stroke-width="0.5"/>
    <text x="245" y="332" text-anchor="middle" font-size="14" fill="#f5f5f5">
      Multi-goal · Multi-horizon
    </text>
    
    <!-- Wealth treatment -->
    <text x="30" y="380" font-size="12" fill="#f0c869" font-weight="600">WEALTH</text>
    <rect x="30" y="390" width="430" height="46" rx="6" fill="#0f3a5c" stroke="#2a7bbb" stroke-width="0.5"/>
    <text x="245" y="417" text-anchor="middle" font-size="14" fill="#f5f5f5">
      Mental Accounts (목표별 계정)
    </text>
    
    <!-- Upgrade tag -->
    <rect x="30" y="465" width="430" height="72" rx="6" fill="#1a3a2a" stroke="#4cbf7a" stroke-width="1"/>
    <text x="245" y="487" text-anchor="middle" font-size="12" fill="#7ae0a0" font-weight="600">✓ 확장된 합리성</text>
    <text x="245" y="509" text-anchor="middle" font-size="12" fill="#b8d8c8">
      Aggregate 수준 MV 효율성 유지
    </text>
    <text x="245" y="527" text-anchor="middle" font-size="12" fill="#b8d8c8">
      계정 수준 해석·행동 가능성 확보
    </text>
  </g>
  
  <!-- Bottom: Three axioms -->
  <g transform="translate(60, 725)">
    <text x="0" y="0" font-size="11" fill="#8a95a8">GBI 3-Axiom:</text>
    <text x="85" y="0" font-size="11" fill="#f0c869" font-weight="600">① 목표 조작화</text>
    <text x="210" y="0" font-size="11" fill="#8a95a8">⟨H, T, ω, α⟩</text>
    <text x="330" y="0" font-size="11" fill="#f0c869" font-weight="600">② 리스크 재정의</text>
    <text x="470" y="0" font-size="11" fill="#8a95a8">shortfall probability</text>
    <text x="640" y="0" font-size="11" fill="#f0c869" font-weight="600">③ 상태의존 동적정책</text>
    <text x="800" y="0" font-size="11" fill="#8a95a8">w*(W_t, t; G)</text>
  </g>
  
  <!-- Footer -->
  <text x="1140" y="760" text-anchor="end" font-size="10" fill="#5a6478" font-style="italic">
    GBI Curriculum · Week 01
  </text>
</svg>
