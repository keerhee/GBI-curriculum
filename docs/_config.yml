title: Goal-Based Investing 강의노트
description: MBA Finance 12주 GBI 종합 커리큘럼 — 이론에서 실무 확장까지
lang: ko

# Front matter가 있는 모든 페이지에 default layout 자동 적용
# (index.html은 front matter가 없어 영향 받지 않음)
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  # 테이블 구분선 '---' 가 em dash '—' 로 자동 변환되지 않도록
  # smart quotes / typographic symbols 비활성화
  smart_quotes: ["apos", "apos", "quot", "quot"]
  typographic_symbols:
    hellip: "..."
    mdash: "---"
    ndash: "--"
    laquo: "<<"
    raquo: ">>"
    laquo_space: "<< "
    raquo_space: " >>"

exclude:
  - README.md
